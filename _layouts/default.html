<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <script>
    (function () {
      try {
        var theme = localStorage.getItem("projects-theme");

        if (theme === "light" || theme === "dark") {
          document.documentElement.setAttribute("data-theme", theme);
        }
      } catch (_error) {
        /* ignore storage failures */
      }
    })();
  </script>
  <script src="{{ '/assets/js/theme.js' | relative_url }}" defer></script>
</head>
<body>
  <header class="site-header">
    <button
      type="button"
      id="theme-toggle"
      class="theme-toggle"
      aria-label="Toggle color theme"
      title="Toggle color theme"
    >
      <span class="theme-toggle-icon theme-toggle-icon-sun" aria-hidden="true">☀</span>
      <span class="theme-toggle-icon theme-toggle-icon-moon" aria-hidden="true">☾</span>
    </button>
  </header>
  <main class="content">
    {{ content }}
  </main>
</body>
</html>
